<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文對話翻牌卡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>🗣️ 英文口說練習對話卡</h1>
        <p>點擊字卡就可以看中文翻譯，一起大聲練口說吧！</p>
    </div>

    <div class="card-container">
        
        <div class="flashcard">
            <div class="card-inner">
                <div class="card-front">
                    <p class="role">A 角色：</p>
                    <p class="sentence">Hello! How are you doing today?</p>
                </div>
                <div class="card-back">
                    <p class="translation">哈囉！你今天過得怎麼樣呀？</p>
                </div>
            </div>
        </div>

        <div class="flashcard">
            <div class="card-inner">
                <div class="card-front">
                    <p class="role">B 角色：</p>
                    <p class="sentence">I am doing great! Thanks for asking.</p>
                </div>
                <div class="card-back">
                    <p class="translation">我過得很好！謝謝你的關心。</p>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
