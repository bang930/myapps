<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 計算機</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>BMI 計算機</h1>
        
        <p>請輸入身高 (公分)：</p>
        <input type="number" id="height" placeholder="例如: 173">

        <p>請輸入體重 (公斤)：</p>
        <input type="number" id="weight" placeholder="例如: 62">

        <button id="calcBtn">開始計算</button>

        <h2>你的 BMI 是：<span id="result">還沒計算唷</span></h2>
    </div>

    <script src="script.js"></script>

</body>
</html>
